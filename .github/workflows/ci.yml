name: Java CI with Gradle

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew check
